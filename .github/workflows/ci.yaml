---
name: Lint

# Runs the same gate as `just check-all` in the openwrt meta-workspace, but
# standalone (this repo has no flake). Tool versions are pinned to match the
# nix-devshells#openwrt shell — bump them together when that shell changes.
# Local reference: `just maintenance::lint-all` / `just check-all`.

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install linters (pinned to nix-devshells#openwrt)
        run: |
          python -m pip install --upgrade pip
          pip install "ansible-lint==25.8.2" "yamllint==1.37.1"
          # group_vars/all.yml resolves secrets via the community.sops lookup;
          # install it so ansible can parse the playbook cleanly.
          ansible-galaxy collection install community.sops

      - name: yamllint
        run: yamllint -c .yamllint ansible

      - name: ansible-lint
        run: ansible-lint ansible/site.yml

      - name: Ansible syntax check
        run: ansible-playbook -i ansible/inventory.ini ansible/site.yml --syntax-check

      - name: shellcheck (tracked shell scripts)
        run: |
          # apt's shellcheck; skip cleanly when there are no shell scripts.
          files=$(git ls-files '*.sh')
          if [ -z "$files" ]; then
            echo "No tracked shell scripts — skipping."
            exit 0
          fi
          sudo apt-get update && sudo apt-get install -y shellcheck
          # shellcheck disable=SC2086
          shellcheck $files
