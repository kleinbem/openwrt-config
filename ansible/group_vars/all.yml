---
# ---------------------------------------------------------------------------
# Secret-relevant values (SSID, passphrase, static-lease MACs) live in
# openwrt-secrets/ansible-vars.yaml (sops/age) — this repo is public, that
# one is not. The lookup is lazy: only tasks that reference these vars
# trigger a decrypt (YubiKey must be present, same as the firmware build).
# Edit with: just secrets::edit ansible-vars.yaml
# ---------------------------------------------------------------------------
_secret_vars: >-
  {{ lookup('community.sops.sops',
            playbook_dir ~ '/../../openwrt-secrets/ansible-vars.yaml')
     | from_yaml }}
wifi_ssid: "{{ _secret_vars.wifi_ssid }}"
wifi_pass: "{{ _secret_vars.wifi_pass }}"
roaming_id: "1234" # 802.11r mobility domain (trusted SSID)
timezone: "Europe/Dublin" # zonename (needs zoneinfo-europe, baked into image)
# POSIX TZ string for the same zone — always correct even if zoneinfo is
# ever missing; busybox ntpd/date read this. Europe/Dublin = GMT/IST.
timezone_posix: "GMT0IST,M3.5.0/1,M10.5.0"

# ---------------------------------------------------------------------------
# QoS / SQM (roles/qos) — cake bufferbloat control on the WAN. Set both to
# your MEASURED line speed (~90–95% of a speedtest) to enable; 0 = disabled
# (safe no-op, so it ships now and you fill these at the bench).
# ---------------------------------------------------------------------------
wan_down_mbit: 0 # WAN download Mbit/s (e.g. 500) — 0 disables SQM
wan_up_mbit: 0 # WAN upload   Mbit/s (e.g. 50)  — 0 disables SQM
# Link-layer overhead: "ethernet"/44 suits fibre/ethernet WAN; for VDSL/PPPoE
# use "ethernet"/34, for ATM/ADSL "atm"/44. Adjust at the bench if needed.
qos_linklayer: "ethernet"
qos_overhead: 44

# ---------------------------------------------------------------------------
# banIP feeds (roles/banip) — high-signal, modest-size only (boards run 2 GiB;
# banIP holds sets in RAM). Add feeds cautiously and watch memory with
# `banip -s`. NOT the huge aggregate/country lists.
# ---------------------------------------------------------------------------
banip_feeds:
  - firehol_level1 # spamhaus DROP + dshield + bogons (highest signal)
  - debl # blocklist.de brute-forcers
  - backscatter # spoofed-source / backscatter

# CrowdSec (roles/crowdsec) is gated OFF: the official 25.12 crowdsec +
# crowdsec-firewall-bouncer packages conflict over /etc/config/crowdsec (apk
# won't overwrite), so they're not in the image. Set true AND re-add the two
# packages to the image profile once upstream fixes the conflict.
crowdsec_enable: false

# ---------------------------------------------------------------------------
# Remote syslog (roles/common) — ship router logs to a fleet collector. Empty
# = local-only (safe no-op). Point at a syslog endpoint on the fleet (e.g. a
# promtail/syslog receiver alongside Loki on nasbook) to enable.
# ---------------------------------------------------------------------------
remote_syslog_ip: "" # e.g. "10.0.0.30" — empty disables
remote_syslog_port: 514
remote_syslog_proto: "udp"

# ---------------------------------------------------------------------------
# UI (roles/ui) — the router hub landing page's "Fleet dashboards" tiles.
# The central home dashboard aggregates everything; these are quick jumps.
# Edit freely; these are just clickable links.
# ---------------------------------------------------------------------------
ui_home_dashboard: "home.kleinbem.dev"
ui_fleet_links:
  # AdGuard is now LOCAL on the gateway (adguard_local) → it's a "This router"
  # tile, not a fleet link. The home dashboard aggregates monitoring/Grafana.
  - { name: "Home Dashboard", url: "https://home.kleinbem.dev", icon: "🏠", desc: "Everything, aggregated" }
  - { name: "Notifications", url: "https://ntfy.kleinbem.dev", icon: "📣", desc: "ntfy alerts / deploy signal" }
  - { name: "n8n", url: "https://n8n.kleinbem.dev", icon: "📡", desc: "Automation workflows" }
  - { name: "Code", url: "https://code.kleinbem.dev", icon: "💻", desc: "code-server" }
  - { name: "Cache", url: "https://cache.kleinbem.dev", icon: "📦", desc: "Nix binary cache" }

# ---------------------------------------------------------------------------
# Wi-Fi radios + SSIDs (roles/wifi) — spec locked 2026-07.
# ---------------------------------------------------------------------------
# The main SSID keeps its existing name AND password (clients survive the
# router swap unchanged); the per-VLAN SSIDs derive their names from it and
# take NEW passphrases from openwrt-secrets/ansible-vars.yaml
# (wifi_pass_iot / wifi_pass_guest / wifi_pass_cameras — add via
# `just secrets::edit ansible-vars.yaml`).
# `encryption: sae-mixed` = WPA2/WPA3 transition mode; the role forces pure
# SAE + MFP on 6 GHz (mandated there). Drop a network to psk2 only if a
# specific device refuses the transition mode.
# `ft` = 802.11r fast roaming between the two BPI-R4s — off for iot/cameras
# (cheap clients often mis-handle FT and those devices don't roam anyway).
wifi_country: "IE"
# Per-band channel widths for the BE14000 (MT7996, Wi-Fi 7 / EHT).
wifi_htmodes: { 2g: "EHT20", 5g: "EHT160", 6g: "EHT320" }
wifi_networks:
  # ── MIGRATION-SAFE layout (2026-07-18) ────────────────────────────────────
  # Rather than turn the existing 16CVG into MPSK (which would risk every
  # already-connected device at once, esp. given the 25.12 MPSK regression),
  # keep 16CVG stable and run MPSK on a SEPARATE new SSID you move devices onto
  # at your own pace. Retire 16CVG once everything's migrated + MPSK is proven.

  # 1. LEGACY/stable — must look EXACTLY like the old router so already-paired
  #    devices reconnect with no prompt at the swap. Old router = WPA2-Personal
  #    (confirmed 2026-07-18), so: psk2 (pure WPA2), 2.4+5 GHz only (WPA2 can't
  #    do 6 GHz), no 802.11r (old router had none). Same SSID + password. During
  #    transition trusted is reachable via WPA2 here (= your setup today) OR via
  #    WPA3 on 16CVG-W3; retire this once devices are migrated, and trusted
  #    becomes WPA3-only.
  - name: trusted
    ssid: "{{ wifi_ssid }}"
    key: "{{ wifi_pass }}"
    network: trusted
    bands: [2g, 5g]
    encryption: psk2
    ft: false

  # 2+3. MPSK — the networks everything-but-guests moves onto, one device at a
  #    time. The PASSWORD picks the VLAN (not the SSID), so we run TWO MPSK
  #    SSIDs that differ only in encryption tier; a device joins whichever its
  #    radio likes and still lands in the right VLAN. Encryption strength is
  #    matched to VLAN sensitivity:
  #      • -W3 (WPA3/sae-mixed): carries the sensitive VLANs (trusted, work)
  #        + iot/cameras for modern gear. Strong, not offline-crackable.
  #      • -W2 (WPA2/psk2): compatibility SSID for cheap gear that chokes on
  #        WPA3 beacons — carries ONLY low-trust VLANs (iot, cameras). If its
  #        WPA2 password is ever cracked, it exposes only isolated VLANs.
  #    trusted keeps its existing password (migrate = forget 16CVG / join -W3).
  #    ⚠️ BENCH-VALIDATE (not verifiable offline): (a) 25.12 ucode wpa_psk_file
  #    dynamic-VLAN regression #20355; (b) whether WPA3-SAE clients on -W3 get
  #    a VLAN — wpa_psk_file is the WPA2 side, so SAE clients may need
  #    sae_password+vlanid (else those devices use 16CVG/-W2). 16CVG is the
  #    reliable WPA3 path for trusted regardless. See docs/NETWORK_PLAN.md.
  - name: mpsk_w3
    ssid: "{{ wifi_ssid }}-W3"
    mpsk: true
    bands: [2g, 5g, 6g]
    encryption: sae-mixed
    ft: false # conservative bring-up; enable once MPSK proven
    default_network: trusted # base bind; dynamic_vlan '2' rejects a PSK with no vlanid
    psk_vlans:
      - { vlan: 10, key: "{{ wifi_pass }}" } # trusted (existing pw → easy move)
      - { vlan: 20, key: "{{ _secret_vars.wifi_pass_iot }}" } # iot
      - { vlan: 30, key: "{{ _secret_vars.wifi_pass_cameras }}" } # cameras
      - { vlan: 50, key: "{{ _secret_vars.wifi_pass_work }}" } # work (WFH laptop)
  - name: mpsk_w2
    ssid: "{{ wifi_ssid }}-W2"
    mpsk: true
    bands: [2g, 5g] # NOT 6g — 6 GHz is WPA3-only; this is the WPA2 tier
    encryption: psk2 # pure WPA2 for maximum legacy-device compatibility
    ft: false
    default_network: iot # base bind (low-trust); dynamic_vlan '2' still requires a vlanid
    # LOW-TRUST VLANs ONLY — never trusted/work on the crackable WPA2 tier.
    psk_vlans:
      - { vlan: 20, key: "{{ _secret_vars.wifi_pass_iot }}" } # iot
      - { vlan: 30, key: "{{ _secret_vars.wifi_pass_cameras }}" } # cameras

  # 3. Guest — plain SSID on purpose (a normal password is far easier to hand a
  #    visitor than an MPSK per-device key). Client-isolated → guest VLAN.
  - name: guest
    ssid: "{{ wifi_ssid }}-Guest"
    key: "{{ _secret_vars.wifi_pass_guest }}"
    network: guest
    bands: [2g, 5g]
    encryption: sae-mixed
    ft: true
    mobility_domain: "4321" # distinct FT domain — guest must not share keys with trusted
    isolate: true # guest clients can't see each other

# ---------------------------------------------------------------------------
# AdGuard resolver — handed to DHCP clients in every VLAN (option 6).
# hass-pi, in the infra VLAN. See docs/NETWORK_PLAN.md.
# ---------------------------------------------------------------------------
adguard_ip: "10.0.0.21" # external AdGuard (hass-pi) — used only when adguard_local is false

# ---------------------------------------------------------------------------
# adguard_local: run AdGuard Home NATIVELY on the gateway (roles/adguard) and
# point every VLAN's DNS at its own gateway. true = move filtering to the edge
# (the network role reworks option-6 + hijack accordingly); the external
# hass-pi AdGuard is then retired at cutover (a fleet change, done separately).
# ---------------------------------------------------------------------------
adguard_local: true

# ---------------------------------------------------------------------------
# WireGuard (roles/wireguard) — OPTIONAL edge VPN / break-glass (NetBird
# already covers normal remote access). Safe no-op until keys are set.
# Generate: `wg genkey | tee server.key | wg pubkey > server.pub`; put the
# private key in sops (wg_server_private_key) and add peers with their pubkeys.
# ---------------------------------------------------------------------------
wg_server_private_key: "{{ _secret_vars.wg_server_private_key | default('') }}"
wg_listen_port: 51820
wg_subnet: "10.9.0.1"
wg_reach: [infra, trusted] # zones VPN clients may reach
wg_peers: [] # e.g. [{ name: phone, public_key: "...", ip: "10.9.0.2" }]

# ---------------------------------------------------------------------------
# NetBird (roles/netbird) — join the router to the FLEET mesh (same as
# nvme/orin/core-pi/nasbook). Safe no-op until keyed. Add a dedicated device
# setup key to sops as netbird_setup_key (a non-expiring device key fits the
# zero-trust NetBird policy). netbird_management_url only for self-hosted.
# Once enrolled: retire the nixos-nvme hosts-file workaround (a fleet change).
# ---------------------------------------------------------------------------
netbird_setup_key: "{{ _secret_vars.netbird_setup_key | default('') }}"
netbird_management_url: "" # empty = NetBird default/cloud

# ---------------------------------------------------------------------------
# VLAN-segmented 10.x — SOURCE OF TRUTH for the network role (to be built).
# Design + firewall matrix: ../../../docs/NETWORK_PLAN.md.
# The fleet — the Tang MESH (every capable host: .5/.12/.21/.22/nasbook…),
# AdGuard 10.0.0.21, and the headless-unlock hosts — all live in the `infra`
# VLAN. Clevis unlock is SSS t=1 (any one Tang server unlocks), so it stays
# within-zone. Keep each unlock host in the same zone as ≥1 of its Tang servers.
# `wan: true` = internet allowed. `reach_out` = other ZONES this VLAN may
# initiate to (actual firewall forwardings). `dns` drives the DNS + input
# policy (one attribute, three tiers — the network role derives everything):
#   trusted  → zone input ACCEPT; DHCP hands out AdGuard primary + this VLAN's
#              own gateway as unfiltered fallback; no hijack. (your devices)
#   filtered → input REJECT; AdGuard ONLY + DNS hijack (:53 DNAT→AdGuard) so
#              hardcoded resolvers can't bypass filtering. (untrusted IoT/etc.)
#   local    → input REJECT; the router's own unfiltered dnsmasq only, NObody
#              hijacked — lets a corporate VPN use its own DNS. (work laptop)
# Enforced by roles/network. Design + matrix: ../../../docs/NETWORK_PLAN.md.
# ---------------------------------------------------------------------------
vlans:
  - id: 1
    name: infra
    subnet: "10.0.0.0/24"
    gateway: "10.0.0.1"
    dhcp: { start: 100, limit: 100 } # .100–.199; fleet uses static leases below
    wan: true
    dns: trusted
    reach_out: [iot, cameras, trusted] # infra can manage everything
  - id: 10
    name: trusted
    subnet: "10.0.10.0/24"
    gateway: "10.0.10.1"
    dhcp: { start: 50, limit: 200 }
    wan: true
    dns: trusted
    reach_out: [infra, iot, cameras]
  - id: 20
    name: iot
    subnet: "10.0.20.0/24"
    gateway: "10.0.20.1"
    dhcp: { start: 50, limit: 200 }
    wan: true
    dns: filtered
    reach_out: [] # internet only (DNS handled by the `dns` tier), no LAN
  - id: 30
    name: cameras
    subnet: "10.0.30.0/24"
    gateway: "10.0.30.1"
    dhcp: { start: 50, limit: 200 }
    wan: false # no phone-home; trusted/NVR pulls streams
    dns: filtered
    reach_out: []
  - id: 40
    name: guest
    subnet: "10.0.40.0/24"
    gateway: "10.0.40.1"
    dhcp: { start: 50, limit: 200 }
    wan: true
    dns: filtered
    reach_out: [] # internet only
  # WFH corporate laptop — isolated from the home LAN both ways, but DNS is
  # NOT hijacked/filtered so her employer's VPN + internal name resolution
  # work. Wi-Fi only (SSID 16CVG-Work); no untagged port in port_maps.
  - id: 50
    name: work
    subnet: "10.0.50.0/24"
    gateway: "10.0.50.1"
    dhcp: { start: 50, limit: 200 }
    wan: true
    dns: local
    reach_out: [] # internet only; no reach into infra/iot/cameras/trusted

# --- INTERIM flat vars (pre-segmentation) --------------------------------
# The current router role (tasks/main.yml) still does a FLAT 10.0.0.1/16 via
# these. They are superseded by `vlans` above once the network role lands;
# remove them then. Kept so a bench deploy today still produces a working
# (unsegmented) gateway.
lan_gateway: "10.0.0.1"
lan_netmask: "255.255.0.0"
# Master switch between the flat interim path and full segmentation.
# true (default since roles/network landed 2026-07-17): roles/network builds
# bridge-VLANs + per-VLAN DHCP + the firewall matrix, and the wifi role
# attaches each SSID to its target VLAN. Rollback = set false: the wifi role
# pins every SSID to flat `lan` and the router role's interim LAN-move task
# takes over again.
vlan_segmentation_live: true

# ---------------------------------------------------------------------------
# Physical port → zone map (roles/network) — decided 2026-07-17.
# ---------------------------------------------------------------------------
# WAN stays on the uci-defaults iface (inventory wan_iface=eth1; NOT managed
# here). The SFP+ link between the two BPI-R4s is a tagged trunk carrying all
# VLANs. DSA port names (lan1…, sfp2) are the expected BPI-R4 names — bench-
# verify once with `ls /sys/class/net` on the flashed board and adjust here
# if the hardware disagrees.
port_maps:
  gateways: # core-gateway, downstairs
    trunk: [sfp2]
    untagged: { lan1: infra, lan2: trusted, lan3: cameras } # cameras = wired cams
  access_points: # ap-upstairs (and future ap-<location> extenders)
    trunk: [sfp2]
    untagged: { lan1: infra, lan2: trusted, lan3: cameras }
ap_mgmt_ip: "10.0.0.2" # ap-upstairs' address on the infra VLAN

# ---------------------------------------------------------------------------
# Static DHCP reservations
# ---------------------------------------------------------------------------
# Pins critical hosts to fixed IPs so leases don't drift. This was the root
# cause of the Orin's headless-unlock outage (2026-05-30): the workstation's
# randomized Wi-Fi MAC kept getting a new DHCP lease, so the Tang server it
# hosts wandered off 10.0.0.5 and the Orin's clevis (bound to
# http://10.0.0.5:7654) could no longer auto-unlock LUKS.
#
# The lease list itself (names, IPs, MACs) lives in openwrt-secrets/
# ansible-vars.yaml — MACs are device fingerprints and stay out of this
# public repo. Subnet check still applies: if the OpenWrt LAN is NOT
# 10.0.0.0/16, both the lease IPs AND the Orin's clevis binding must move
# to the new subnet together.
static_leases: "{{ _secret_vars.static_leases }}"
