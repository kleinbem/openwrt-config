---
# ---------------------------------------------------------------------------
# Secret-relevant values (SSID, passphrase, static-lease MACs) live in
# openwrt-secrets/ansible-vars.yaml (sops/age) — this repo is public, that
# one is not. The lookup is lazy: only tasks that reference these vars
# trigger a decrypt (YubiKey must be present, same as the firmware build).
# Edit with: just secrets::edit ansible-vars.yaml
# ---------------------------------------------------------------------------
_secret_vars: >-
  {{ lookup('community.sops.sops',
            playbook_dir ~ '/../../openwrt-secrets/ansible-vars.yaml')
     | from_yaml }}
wifi_ssid: "{{ _secret_vars.wifi_ssid }}"
wifi_pass: "{{ _secret_vars.wifi_pass }}"
roaming_id: "1234" # 802.11r mobility domain (trusted SSID)
timezone: "Europe/Dublin"

# ---------------------------------------------------------------------------
# Wi-Fi radios + SSIDs (roles/wifi) — spec locked 2026-07.
# ---------------------------------------------------------------------------
# The main SSID keeps its existing name AND password (clients survive the
# router swap unchanged); the per-VLAN SSIDs derive their names from it and
# take NEW passphrases from openwrt-secrets/ansible-vars.yaml
# (wifi_pass_iot / wifi_pass_guest / wifi_pass_cameras — add via
# `just secrets::edit ansible-vars.yaml`).
# `encryption: sae-mixed` = WPA2/WPA3 transition mode; the role forces pure
# SAE + MFP on 6 GHz (mandated there). Drop a network to psk2 only if a
# specific device refuses the transition mode.
# `ft` = 802.11r fast roaming between the two BPI-R4s — off for iot/cameras
# (cheap clients often mis-handle FT and those devices don't roam anyway).
wifi_country: "IE"
# Per-band channel widths for the BE14000 (MT7996, Wi-Fi 7 / EHT).
wifi_htmodes: { 2g: "EHT20", 5g: "EHT160", 6g: "EHT320" }
wifi_networks:
  - name: trusted
    ssid: "{{ wifi_ssid }}"
    key: "{{ wifi_pass }}"
    network: trusted
    bands: [2g, 5g, 6g]
    encryption: sae-mixed
    ft: true
    mobility_domain: "{{ roaming_id }}"
  - name: iot
    ssid: "{{ wifi_ssid }}-IoT"
    key: "{{ _secret_vars.wifi_pass_iot }}"
    network: iot
    bands: [2g, 5g] # 2.4 mandatory (2.4-only IoT gear), 5 for the capable ones
    encryption: sae-mixed
    ft: false
  - name: cameras
    ssid: "{{ wifi_ssid }}-Cam"
    key: "{{ _secret_vars.wifi_pass_cameras }}"
    network: cameras
    bands: [2g, 5g] # wifi cams are usually 2.4-only, but allow 5
    encryption: sae-mixed
    ft: false
  - name: guest
    ssid: "{{ wifi_ssid }}-Guest"
    key: "{{ _secret_vars.wifi_pass_guest }}"
    network: guest
    bands: [2g, 5g]
    encryption: sae-mixed
    ft: true
    mobility_domain: "4321" # distinct FT domain — guest must not share keys with trusted
    isolate: true # guest clients can't see each other

# ---------------------------------------------------------------------------
# AdGuard resolver — handed to DHCP clients in every VLAN (option 6).
# hass-pi, in the infra VLAN. See docs/NETWORK_PLAN.md.
# ---------------------------------------------------------------------------
adguard_ip: "10.0.0.21"

# ---------------------------------------------------------------------------
# VLAN-segmented 10.x — SOURCE OF TRUTH for the network role (to be built).
# Design + firewall matrix: ../../../docs/NETWORK_PLAN.md.
# The fleet — the Tang MESH (every capable host: .5/.12/.21/.22/nasbook…),
# AdGuard 10.0.0.21, and the headless-unlock hosts — all live in the `infra`
# VLAN. Clevis unlock is SSS t=1 (any one Tang server unlocks), so it stays
# within-zone. Keep each unlock host in the same zone as ≥1 of its Tang servers.
# `wan: true` = internet allowed; `reach` = other zones this VLAN may initiate
# to (dns = AdGuard :53/:853 only). Enforced by the firewall role.
# ---------------------------------------------------------------------------
vlans:
  - id: 1
    name: infra
    subnet: "10.0.0.0/24"
    gateway: "10.0.0.1"
    dhcp: { start: 100, limit: 100 } # .100–.199; fleet uses static leases below
    wan: true
    reach: [trusted] # who may reach infra is set per-zone below; infra itself:
    reach_out: [iot, cameras, trusted] # infra can manage everything
  - id: 10
    name: trusted
    subnet: "10.0.10.0/24"
    gateway: "10.0.10.1"
    dhcp: { start: 50, limit: 200 }
    wan: true
    reach_out: [infra, iot, cameras]
  - id: 20
    name: iot
    subnet: "10.0.20.0/24"
    gateway: "10.0.20.1"
    dhcp: { start: 50, limit: 200 }
    wan: true
    reach_out: [dns] # internet + AdGuard DNS only, no LAN
  - id: 30
    name: cameras
    subnet: "10.0.30.0/24"
    gateway: "10.0.30.1"
    dhcp: { start: 50, limit: 200 }
    wan: false # no phone-home; trusted/NVR pulls streams
    reach_out: [dns]
  - id: 40
    name: guest
    subnet: "10.0.40.0/24"
    gateway: "10.0.40.1"
    dhcp: { start: 50, limit: 200 }
    wan: true
    reach_out: [dns] # internet only

# --- INTERIM flat vars (pre-segmentation) --------------------------------
# The current router role (tasks/main.yml) still does a FLAT 10.0.0.1/16 via
# these. They are superseded by `vlans` above once the network role lands;
# remove them then. Kept so a bench deploy today still produces a working
# (unsegmented) gateway.
lan_gateway: "10.0.0.1"
lan_netmask: "255.255.0.0"
# Master switch between the flat interim path and full segmentation.
# true (default since roles/network landed 2026-07-17): roles/network builds
# bridge-VLANs + per-VLAN DHCP + the firewall matrix, and the wifi role
# attaches each SSID to its target VLAN. Rollback = set false: the wifi role
# pins every SSID to flat `lan` and the router role's interim LAN-move task
# takes over again.
vlan_segmentation_live: true

# ---------------------------------------------------------------------------
# Physical port → zone map (roles/network) — decided 2026-07-17.
# ---------------------------------------------------------------------------
# WAN stays on the uci-defaults iface (inventory wan_iface=eth1; NOT managed
# here). The SFP+ link between the two BPI-R4s is a tagged trunk carrying all
# VLANs. DSA port names (lan1…, sfp2) are the expected BPI-R4 names — bench-
# verify once with `ls /sys/class/net` on the flashed board and adjust here
# if the hardware disagrees.
port_maps:
  gateways: # core-gateway, downstairs
    trunk: [sfp2]
    untagged: { lan1: infra, lan2: trusted, lan3: cameras } # cameras = wired cams
  access_points: # ap-upstairs (and future ap-<location> extenders)
    trunk: [sfp2]
    untagged: { lan1: infra, lan2: trusted, lan3: cameras }
ap_mgmt_ip: "10.0.0.2" # ap-upstairs' address on the infra VLAN

# ---------------------------------------------------------------------------
# Static DHCP reservations
# ---------------------------------------------------------------------------
# Pins critical hosts to fixed IPs so leases don't drift. This was the root
# cause of the Orin's headless-unlock outage (2026-05-30): the workstation's
# randomized Wi-Fi MAC kept getting a new DHCP lease, so the Tang server it
# hosts wandered off 10.0.0.5 and the Orin's clevis (bound to
# http://10.0.0.5:7654) could no longer auto-unlock LUKS.
#
# The lease list itself (names, IPs, MACs) lives in openwrt-secrets/
# ansible-vars.yaml — MACs are device fingerprints and stay out of this
# public repo. Subnet check still applies: if the OpenWrt LAN is NOT
# 10.0.0.0/16, both the lease IPs AND the Orin's clevis binding must move
# to the new subnet together.
static_leases: "{{ _secret_vars.static_leases }}"
