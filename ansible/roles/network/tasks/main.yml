---
# ---------------------------------------------------------------------------
# Network/VLAN role — segments the flat 10.x per docs/NETWORK_PLAN.md.
# ---------------------------------------------------------------------------
# Consumes the `vlans` + `port_maps` source of truth in group_vars/all.yml.
# Gateway: per-VLAN interfaces + DHCP pools (AdGuard via option 6) + the full
# firewall zone matrix. AP: same bridge-VLANs, single mgmt IP on infra, L2
# bridge for everything else — its SSIDs tag clients into the right VLAN over
# the trunk. Gated in site.yml on vlan_segmentation_live.
#
# LUKS constraint (do not break): the Tang mesh and every headless-unlock
# host live together in the infra VLAN, so clevis unlock never crosses a
# firewall boundary. See NETWORK_PLAN.md before moving any fleet host.
- name: Render network uci script
  ansible.builtin.template:
    src: network-config.sh.j2
    dest: /tmp/network-config.sh
    mode: "0700"

- name: Stage network configuration (uci commits only — no reload yet)
  raw: sh /tmp/network-config.sh

- name: Remove rendered script
  ansible.builtin.file:
    path: /tmp/network-config.sh
    state: absent

- name: Enable + restart dnsmasq (gateway serves per-VLAN DHCP)
  when: "'gateways' in group_names"
  raw: /etc/init.d/dnsmasq enable && /etc/init.d/dnsmasq restart

- name: Restart firewall (gateway applies the zone matrix)
  when: "'gateways' in group_names"
  raw: /etc/init.d/firewall restart

# mDNS reflector (gateway only — it holds the L3 interfaces in both VLANs;
# on the AP those VLANs are L2 bridges with no address, so nothing to
# reflect). Bridges service discovery trusted<->iot.
- name: Configure mDNS reflector (avahi)
  when: "'gateways' in group_names"
  block:
    - name: Render avahi reflector config
      ansible.builtin.template:
        src: avahi-daemon.conf.j2
        dest: /etc/avahi/avahi-daemon.conf
        mode: "0644"
    - name: Enable + restart avahi reflector
      raw: /etc/init.d/avahi-daemon enable && /etc/init.d/avahi-daemon restart

# NTP server + timezone take effect on the next sysntpd cycle; nudge it now
# so served time is correct immediately (both hosts).
- name: Restart sysntpd (apply NTP server / timezone)
  raw: /etc/init.d/sysntpd restart

# ---------------------------------------------------------------------------
# TERMINAL TASK — applies the new addressing; DROPS SSH on both hosts as the
# management IP moves onto the infra VLAN (gateway → 10.0.0.1, AP → .2).
# Reconnect on an infra access port (see port_maps); after bench, point the
# inventory at the new addresses. ignore_errors: the drop is expected.
# ---------------------------------------------------------------------------
- name: Restart network (TERMINAL — drops SSH, reconnect on infra VLAN)
  raw: /etc/init.d/network restart
  ignore_errors: true
