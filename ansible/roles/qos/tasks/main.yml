---
# ---------------------------------------------------------------------------
# QoS / SQM (cake) — kills bufferbloat on the WAN so latency stays flat under
# load. Biggest quality-of-life win for the WFH video calls: cake's
# `layer_cake` script honours the DSCP marks call apps (Teams/Zoom/Meet) set
# on their own traffic, so real-time flows keep priority when the link is
# saturated by a big upload/download.
# ---------------------------------------------------------------------------
# Gateway only (the WAN lives there). Package luci-app-sqm + sqm-scripts are
# in the firmware image. Bandwidth MUST be set to your real line speed to work
# — leave wan_down_mbit / wan_up_mbit at 0 and this role is a safe no-op, so
# it ships now and you fill the numbers at the bench (set to ~90–95% of a
# measured speedtest; too-high defeats the point, too-low wastes throughput).
- name: Configure SQM/cake on the WAN
  when: "'gateways' in group_names and (wan_down_mbit | int) > 0 and (wan_up_mbit | int) > 0"
  block:
    - name: Set cake queue on the WAN interface
      raw: |
        uci set sqm.wan=queue
        uci set sqm.wan.interface='{{ wan_iface }}'
        uci set sqm.wan.enabled='1'
        uci set sqm.wan.download='{{ (wan_down_mbit | int) * 1000 }}'
        uci set sqm.wan.upload='{{ (wan_up_mbit | int) * 1000 }}'
        uci set sqm.wan.qdisc='cake'
        uci set sqm.wan.script='layer_cake.qos'
        uci set sqm.wan.qdisc_advanced='1'
        uci set sqm.wan.egress_ecn='NOECN'
        uci set sqm.wan.ingress_ecn='ECN'
        uci set sqm.wan.linklayer='{{ qos_linklayer | default("ethernet") }}'
        uci set sqm.wan.overhead='{{ qos_overhead | default(44) }}'
        uci commit sqm

    - name: Enable + (re)start SQM
      raw: /etc/init.d/sqm enable && /etc/init.d/sqm restart

- name: Note when SQM is skipped (no line speed set)
  when: "'gateways' in group_names and ((wan_down_mbit | int) == 0 or (wan_up_mbit | int) == 0)"
  ansible.builtin.debug:
    msg: >-
      SQM/cake not configured — set wan_down_mbit / wan_up_mbit in group_vars
      to your measured line speed (~90-95%) to enable bufferbloat control.
