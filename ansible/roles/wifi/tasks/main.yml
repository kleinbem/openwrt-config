---
# ---------------------------------------------------------------------------
# Wi-Fi radio role — tri-band BE14000 (MT7996) on both BPI-R4s.
# ---------------------------------------------------------------------------
# Spec (locked 2026-07): SSID family derived from the existing secret SSID
# (main network keeps its current name + password so clients survive the
# router swap), country IE, WPA3/SAE (pure SAE forced on 6 GHz), 802.11r
# fast roaming between gateway and upstairs AP, DAWN for client steering.
# SSID→VLAN map + bands live in group_vars/all.yml (`wifi_networks`).
#
# The uci logic runs as one rendered shell script instead of per-setting raw
# tasks: it must discover radios at runtime (a board without the Wi-Fi NIC
# fitted is a clean no-op) and commit/reload once, atomically.

# MPSK map file(s): one hostapd wpa_psk_file per `mpsk` SSID, mapping each
# passphrase to a VLAN (vlanid=). hostapd + dynamic_vlan tags stations into
# the right br-lan.<vlan> by which password they used. Written first so the
# wireless config below can reference it. 0600 — contains passphrases.
- name: Ensure hostapd dir exists
  ansible.builtin.file:
    path: /etc/hostapd
    state: directory
    mode: "0755"

- name: Render MPSK wpa_psk map file(s)
  ansible.builtin.template:
    src: wpa_psk_file.j2
    dest: "/etc/hostapd/{{ item.name }}.wpa_psk"
    mode: "0600"
  loop: "{{ wifi_networks | selectattr('mpsk', 'defined') | selectattr('mpsk') | list }}"
  loop_control:
    label: "{{ item.name }}" # don't print the psk_vlans (passphrases) in the loop header
  no_log: true

- name: Render Wi-Fi uci script
  ansible.builtin.template:
    src: wifi-config.sh.j2
    dest: /tmp/wifi-config.sh
    mode: "0700"
  no_log: true # the rendered script embeds SSIDs + passphrases — keep out of logs/--diff
  diff: false

- name: Apply Wi-Fi configuration (uci commit + wifi reload)
  raw: sh /tmp/wifi-config.sh

- name: Remove rendered script (contains passphrases)
  ansible.builtin.file:
    path: /tmp/wifi-config.sh
    state: absent

# DAWN (in the firmware image) coordinates the two APs over the LAN and
# steers clients to the better one; 802.11r above makes that steer fast.
- name: Enable and start DAWN roaming daemon
  ansible.builtin.service:
    name: dawn
    enabled: true
    state: started
