---
# 1. Configure the PHYSICAL Routers (OpenWrt)
- name: Configure Routers
  hosts: routers
  gather_facts: true
  roles:
    - common
    - wifi # radios + SSIDs; safe while the connection is up
    - qos # SQM/cake on the WAN (gateway only; no-op until line speed set)
    - banip # edge threat-feed blocking (gateway only)
    - adguard # native AdGuard Home DNS filtering (gateway; adguard_local)
    - role: crowdsec # native behavioural IPS — gated OFF (upstream pkg conflict)
      when: crowdsec_enable | default(false)
    - wireguard # optional edge VPN / break-glass (gateway; no-op until keyed)
    - netbird # join the fleet mesh (all routers; no-op until keyed)
    - ui # Material theme + network hub landing page (all routers)
    - router # exporter/LXC/leases (+ flat LAN move when segmentation is off)
    - role: network # LAST: terminal network restart drops SSH (mgmt IP → infra VLAN)
      when: vlan_segmentation_live
