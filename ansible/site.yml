---
# 1. Configure the PHYSICAL Routers (OpenWrt)
- name: Configure Routers
  hosts: routers
  gather_facts: true
  roles:
    - common
    - wifi # before router: router's terminal task moves the LAN IP and drops SSH
    - router

# 2. Configure the VIRTUAL Brains (NixOS)
# Note: Ansible just triggers the rebuild or manages simple keys here.
- name: Verify Brain Connectivity
  hosts: brains
  tasks:
    - name: Ping
      ansible.builtin.ping:
